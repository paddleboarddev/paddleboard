name: Release

# PaddleBoard: on a version tag, builds release artifacts and attaches them to the
# Release publish-public.sh created — a signed + notarized macOS (Apple Silicon) DMG
# and a Linux x86_64 tarball. The two jobs are INDEPENDENT: a Linux failure never
# blocks the macOS build (or vice versa). macOS signing is driven by repo secrets
# (below); if they're absent the bundle falls back to an ad-hoc signature. Linux
# needs no secrets.
#
# Required repo secrets for a signed + notarized build:
#   MACOS_SIGNING_IDENTITY        - e.g. "Developer ID Application: Your Name (TEAMID)"
#   MACOS_CERTIFICATE             - base64 of the exported Developer ID .p12
#   MACOS_CERTIFICATE_PASSWORD    - password for that .p12
#   APPLE_NOTARIZATION_KEY        - contents of the App Store Connect API .p8 key
#   APPLE_NOTARIZATION_KEY_ID     - the API key's Key ID
#   APPLE_NOTARIZATION_ISSUER_ID  - the API key's Issuer ID
#
# The git tag must match the paddleboard crate version, i.e. `v<version>`
# (currently v0.1.14). publish-public.sh owns the Release shell (notes, tag, site
# bump) and creates it as a prerelease; this workflow builds the signed DMG and
# ATTACHES it to that Release, then a human drops the prerelease flag after review.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos:
    # PaddleBoard: macos-15 (Xcode 16.x / newer libc++). macos-14's Xcode 15.4
    # libc++ fails to compile the inherited webrtc-sys cxx bridge under C++20
    # (rust::Slice iterator not treated as a contiguous_iterator). Local builds
    # on a newer Xcode compile it fine, so match the runner toolchain to that.
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Build the public stable channel
        run: echo "stable" > crates/paddleboard/RELEASE_CHANNEL

      - name: Validate tag against crate version
        run: script/determine-release-channel

      - name: Set up Rust
        run: |
          rustup update stable
          rustup target add aarch64-apple-darwin

      - name: Build, sign, notarize, and bundle (Apple Silicon)
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_NOTARIZATION_KEY: ${{ secrets.APPLE_NOTARIZATION_KEY }}
          APPLE_NOTARIZATION_KEY_ID: ${{ secrets.APPLE_NOTARIZATION_KEY_ID }}
          APPLE_NOTARIZATION_ISSUER_ID: ${{ secrets.APPLE_NOTARIZATION_ISSUER_ID }}
          # Public OAuth client id (no secret) baked into the binary at compile
          # time via option_env! — enables "Sign in with GitHub" in Git Logins.
          # Unset until the OAuth app is registered; builds work fine without it.
          PADDLEBOARD_GITHUB_OAUTH_CLIENT_ID: ${{ vars.PADDLEBOARD_GITHUB_OAUTH_CLIENT_ID }}
        run: script/bundle-mac aarch64-apple-darwin

      - name: Attach signed DMG to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # publish-public.sh creates the Release (as a prerelease, with notes)
          # right after pushing this tag, so normally it already exists by the time
          # this ~25-min build finishes. Create-if-missing guards the unlikely race
          # where CI beats the publish script; --clobber makes re-runs idempotent.
          dmg="target/aarch64-apple-darwin/release/PaddleBoard-aarch64.dmg"
          if ! gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "PaddleBoard ${GITHUB_REF_NAME}" \
              --prerelease \
              --generate-notes
          fi
          gh release upload "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber \
            "${dmg}#PaddleBoard (Apple Silicon).dmg"

  linux:
    # Independent of the macOS job — a Linux failure won't block the signed DMG or
    # the release. Built on ubuntu-22.04 for broad glibc compatibility. No signing.
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Build the public stable channel
        run: echo "stable" > crates/paddleboard/RELEASE_CHANNEL

      - name: Install Linux build dependencies
        run: ./script/linux

      - name: Set up Rust
        run: rustup update stable

      - name: Build the Linux bundle (x86_64)
        env:
          PADDLEBOARD_GITHUB_OAUTH_CLIENT_ID: ${{ vars.PADDLEBOARD_GITHUB_OAUTH_CLIENT_ID }}
        run: script/bundle-linux

      - name: Attach the Linux tarball to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Same create-if-missing + --clobber pattern as the macOS job, so whichever
          # job reaches the release first creates the shell and the other just uploads.
          tarball="$(ls target/release/paddleboard-linux-*.tar.gz | head -1)"
          if ! gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "PaddleBoard ${GITHUB_REF_NAME}" \
              --prerelease \
              --generate-notes
          fi
          gh release upload "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber \
            "${tarball}#PaddleBoard (Linux x86_64).tar.gz"
