name: Merge upstream Zed

on:
  schedule:
    # Mondays at 16:00 UTC ≈ 09:00 PDT / 08:00 PST.
    # GitHub may delay scheduled runs by 5-15 minutes during peak load.
    - cron: "0 16 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "paddleboard-bot"
          git config user.email "paddleboard-bot@users.noreply.github.com"

      - name: Fetch upstream Zed
        run: |
          git remote add zed https://github.com/zed-industries/zed.git
          git fetch zed main --no-tags

      - name: Compute branch name and SHAs
        id: meta
        run: |
          date_tag=$(date -u +%Y-%m-%d)
          branch="chore/merge-upstream-zed-${date_tag}"
          base_sha=$(git rev-parse HEAD)
          upstream_sha=$(git rev-parse zed/main)
          merge_base=$(git merge-base HEAD zed/main)
          commits_ahead=$(git rev-list --count "${merge_base}..zed/main")
          {
            echo "branch=${branch}"
            echo "date_tag=${date_tag}"
            echo "base_sha=${base_sha}"
            echo "upstream_sha=${upstream_sha}"
            echo "merge_base=${merge_base}"
            echo "commits_ahead=${commits_ahead}"
          } >> "${GITHUB_OUTPUT}"

      - name: Skip if nothing new
        if: steps.meta.outputs.commits_ahead == '0'
        run: |
          echo "Upstream zed/main has no commits past merge-base. Nothing to do."
          exit 0

      - name: Create merge branch
        if: steps.meta.outputs.commits_ahead != '0'
        env:
          BRANCH: ${{ steps.meta.outputs.branch }}
        run: git checkout -b "$BRANCH"

      - name: Attempt merge
        if: steps.meta.outputs.commits_ahead != '0'
        id: merge
        env:
          BRANCH: ${{ steps.meta.outputs.branch }}
        run: |
          set +e
          git merge --no-ff --no-edit --no-commit zed/main
          merge_status=$?
          set -e

          # PaddleBoard owns .github/workflows/. The default GITHUB_TOKEN cannot
          # push commits that create or update workflow files, so any upstream
          # churn there — modify/delete conflicts (DU), new workflows we never
          # had, or clean automerges of upstream-modified workflows — would block
          # the push. Since PB deleted all upstream workflows during fork cleanup,
          # the correct resolution is to discard upstream's view of this directory
          # and restore exactly what HEAD had.
          git rm -rf --ignore-unmatch --quiet -- .github/workflows/ >/dev/null 2>&1 || true
          git checkout HEAD -- .github/workflows/ >/dev/null 2>&1 || true

          if git ls-files --unmerged | grep -q .; then
            echo "conflicts=true" >> "${GITHUB_OUTPUT}"
            # Record the remaining conflict markers as a commit so the PR diff makes them visible.
            git add -A
            git -c commit.gpgsign=false commit -m "Merge upstream zed/main into ${BRANCH} (CONFLICTS)"
            # List files with leftover conflict markers for the PR body.
            git grep -l '^<<<<<<< ' -- ':!.git' > conflict_files.txt || true
          else
            echo "conflicts=false" >> "${GITHUB_OUTPUT}"
            # Either a fully clean merge or the only conflicts were workflow files we just dropped.
            git add -A
            git -c commit.gpgsign=false commit --no-edit -m "Merge upstream zed/main into ${BRANCH}"
            : > conflict_files.txt
          fi

      - name: Build PR body
        if: steps.meta.outputs.commits_ahead != '0'
        id: body
        env:
          UPSTREAM_SHA: ${{ steps.meta.outputs.upstream_sha }}
          MERGE_BASE: ${{ steps.meta.outputs.merge_base }}
          COMMITS_AHEAD: ${{ steps.meta.outputs.commits_ahead }}
          BASE_SHA: ${{ steps.meta.outputs.base_sha }}
          CONFLICTS: ${{ steps.merge.outputs.conflicts }}
        run: |
          {
            echo "## Weekly upstream merge"
            echo ""
            echo "- Upstream: \`zed-industries/zed@${UPSTREAM_SHA}\`"
            echo "- Merge base: \`${MERGE_BASE}\`"
            echo "- Commits ahead upstream: ${COMMITS_AHEAD}"
            echo "- Compare: https://github.com/zed-industries/zed/compare/${MERGE_BASE}...${UPSTREAM_SHA}"
            echo ""
            if [ "${CONFLICTS}" = "true" ]; then
              echo "### ⚠️ Conflicts"
              echo ""
              echo "The merge produced conflicts. Conflict markers are committed to the branch — resolve locally before marking ready."
              echo ""
              echo "Files with leftover conflict markers:"
              echo ""
              echo '```'
              cat conflict_files.txt
              echo '```'
              echo ""
            else
              echo "### ✅ Clean merge"
              echo ""
              echo "No conflicts. Review the diff to confirm no fork-specific behavior was silently overwritten by upstream — especially in \`assets/settings/default.json\`, \`assets/keymaps/\`, and any file containing a \`// PaddleBoard\` marker."
              echo ""
            fi
            echo "### Fork-modified files also touched by this merge"
            echo ""
            echo "Files containing \`// PaddleBoard\` divergence markers that received upstream changes (manual review recommended):"
            echo ""
            echo '```'
            git diff --name-only "${BASE_SHA}" HEAD -- 'crates/**/*.rs' | while read -r f; do
              if [ -f "$f" ] && grep -q "PaddleBoard" "$f"; then
                echo "$f"
              fi
            done
            echo '```'
            echo ""
            echo "_Generated by \`.github/workflows/merge_upstream_zed.yml\`._"
            echo ""
            echo "Release Notes:"
            echo ""
            echo "- N/A"
          } > pr_body.md
          echo "path=pr_body.md" >> "${GITHUB_OUTPUT}"

      - name: Push branch
        if: steps.meta.outputs.commits_ahead != '0'
        env:
          BRANCH: ${{ steps.meta.outputs.branch }}
        run: git push --set-upstream origin "$BRANCH"

      - name: Open PR
        if: steps.meta.outputs.commits_ahead != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.meta.outputs.branch }}
          DATE_TAG: ${{ steps.meta.outputs.date_tag }}
          CONFLICTS: ${{ steps.merge.outputs.conflicts }}
        run: |
          draft_flag=""
          if [ "${CONFLICTS}" = "true" ]; then
            draft_flag="--draft"
          fi
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Merge upstream zed/main (${DATE_TAG})" \
            --body-file pr_body.md \
            $draft_flag
